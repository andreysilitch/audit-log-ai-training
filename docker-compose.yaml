services:
  postgres:
    image: postgres:16-alpine
    container_name: audit-postgres
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    ports:
      - "5432:5432"
    volumes:
      - audit-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit
      SPRING_DATASOURCE_USERNAME: audit
      SPRING_DATASOURCE_PASSWORD: audit
    ports:
      - "8080:8080"
    profiles:
      - app

volumes:
  audit-pg-data:
